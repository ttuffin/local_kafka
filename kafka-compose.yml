services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka-sasl
    hostname: kafka-broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka-broker:9093'

      # Networking & Listeners
      # 29092 for other containers on 'my-shared-network'
      # 9092 for your host machine (kafka-broker)
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'

      # If you connect via 9092, Kafka will tell you to use "localhost"
      # If another container connects via 29092, Kafka tells it to use "kafka-sasl"
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka-sasl:29092,EXTERNAL://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'INTERNAL:SASL_SSL,EXTERNAL:SASL_SSL,CONTROLLER:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      
      # SASL & JAAS
      KAFKA_SASL_ENABLED_MECHANISMS: 'PLAIN'
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: 'PLAIN'
      KAFKA_OPTS: "-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf"

      # SSL Configuration (for EXTERNAL and INTERNAL listeners)
      KAFKA_SSL_KEYSTORE_LOCATION: '/etc/kafka/ssl/kafka.broker.keystore.jks'
      KAFKA_SSL_KEYSTORE_PASSWORD: 'changeit'
      KAFKA_SSL_TRUSTSTORE_LOCATION: '/etc/kafka/ssl/kafka.client.truststore.jks'
      KAFKA_SSL_TRUSTSTORE_PASSWORD: 'changeit'
      KAFKA_SSL_KEY_PASSWORD: 'changeit'

      # Tell Kafka to allow 1 replica for internal topics
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      
      # Optional: Make sure user-created topics also default to 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1
      
      CLUSTER_ID: 'dGhpc2lzYXJhbmRvbXN0cgo='
    volumes:
      - ./kafka_server_jaas.conf:/etc/kafka/kafka_server_jaas.conf:z
      - ./certs:/etc/kafka/ssl:ro,z
      - kafka_data_sasl:/var/lib/kafka/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    expose:
      - "8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: mycluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-sasl:29092
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SASL_SSL
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_LOCATION: /etc/kafka/ssl/kafka.client.truststore.jks
      KAFKA_CLUSTERS_0_PROPERTIES_SSL_TRUSTSTORE_PASSWORD: changeit
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM: PLAIN
      KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG: >-
        org.apache.kafka.common.security.plain.PlainLoginModule required
        username="admin"
        password="admin-password";
      AUTH_TYPE: LOGIN_FORM
      SPRING_SECURITY_USER_NAME: admin
      SPRING_SECURITY_USER_PASSWORD: admin-password
    volumes:
      - ./certs:/etc/kafka/ssl:ro,z
    depends_on:
      - kafka

  caddy:
    image: caddy:latest
    container_name: caddy
    ports:
      - "9443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro,z
      - ./certs/caddy.crt:/etc/caddy/certs/caddy.crt:ro,z
      - ./certs/caddy.key:/etc/caddy/certs/caddy.key:ro,z
      - caddy_data:/data
    depends_on:
      - kafka-ui

volumes:
  caddy_data:
  kafka_data_sasl:

networks:
  default:
    external: True
    name: docker_default
